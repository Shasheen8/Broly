name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Seed Go module proxy
        run: |
          VERSION="${{ github.ref_name }}"
          # Module path is case-encoded: Shasheen8 -> !shasheen8, Broly -> !broly
          curl -sf "https://proxy.golang.org/github.com/!shasheen8/!broly/@v/${VERSION}.info" > /dev/null || true
          curl -sf "https://sum.golang.org/lookup/github.com/!shasheen8/!broly@${VERSION}" > /dev/null || true
          echo "Go proxy seeded for ${VERSION}"
