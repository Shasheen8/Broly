name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libhyperscan-dev

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -trimpath -o bin/broly ./cmd/broly

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_BROLY }}

      - name: Bump patch version and push tag
        run: |
          set -e
          latest=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            major=$(echo "$latest" | cut -d. -f1 | tr -d v)
            minor=$(echo "$latest" | cut -d. -f2)
            patch=$(echo "$latest" | cut -d. -f3)
            next="v${major}.${minor}.$((patch + 1))"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$next"
          git push origin "$next"
        env:
          GH_TOKEN: ${{ secrets.GH_BROLY }}
