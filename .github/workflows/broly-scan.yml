name: Broly Security Scan

# Reusable workflow — call from any repo:
#
#   jobs:
#     security:
#       uses: Shasheen8/Broly/.github/workflows/broly-scan.yml@main
#       secrets:
#         together_api_key: ${{ secrets.TOGETHER_API_KEY }}
#
# Optional inputs:
#   min_severity   — info | low | medium | high | critical  (default: low)
#   scanners       — all | sast | sca | secrets             (default: all)
#   ai_triage      — true | false                           (default: false)

on:
  workflow_call:
    inputs:
      min_severity:
        description: "Minimum severity to report"
        type: string
        default: "low"
      scanners:
        description: "Scanners to run: all, sast, sca, secrets"
        type: string
        default: "all"
      ai_triage:
        description: "Enable AI triage (TP/FP verdict + fix)"
        type: boolean
        default: false
    secrets:
      together_api_key:
        description: "Together AI API key (required for SAST and AI features)"
        required: false

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  scan:
    name: Broly
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install Broly
        run: go install github.com/Shasheen8/Broly/cmd/broly@latest

      - name: Get changed files
        if: github.event_name == 'pull_request'
        id: diff
        run: |
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...${SHA}" \
            | grep -E '\.(go|py|js|ts|jsx|tsx|java|rb|php|cs|rs|c|cpp|h|hpp|kt|swift|sh|bash)$' \
            | head -50 | tr '\n' ' ')
          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "has_code=$([ -n "${CHANGED}" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
        env:
          BASE_REF: ${{ github.base_ref }}
          SHA: ${{ github.sha }}

      - name: Scan PR diff
        if: github.event_name == 'pull_request' && steps.diff.outputs.has_code == 'true'
        run: |
          mkdir -p sarif
          MIN_SEV="${INPUT_MIN_SEVERITY}"
          AI_FLAGS=""
          if [ -n "${TOGETHER_API_KEY}" ]; then
            AI_FLAGS="--sast"
            if [ "${INPUT_AI_TRIAGE}" = "true" ]; then
              AI_FLAGS="${AI_FLAGS} --ai-triage --explain"
            fi
          fi
          broly scan . --secrets --sca --min-severity "${MIN_SEV}" \
            -f sarif -o sarif/fast.sarif -q || true
          broly scan . --secrets --sca --min-severity "${MIN_SEV}" \
            -f json -o results.json -q || true
          if [ -n "${AI_FLAGS}" ] && [ -n "${CHANGED_FILES}" ]; then
            # shellcheck disable=SC2086
            broly scan ${CHANGED_FILES} ${AI_FLAGS} --min-severity "${MIN_SEV}" \
              -f sarif -o sarif/sast.sarif -q || true
            # shellcheck disable=SC2086
            broly scan ${CHANGED_FILES} ${AI_FLAGS} --min-severity "${MIN_SEV}" \
              -f json -o sast-results.json -q || true
          fi
        env:
          TOGETHER_API_KEY: ${{ secrets.together_api_key }}
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
          INPUT_MIN_SEVERITY: ${{ inputs.min_severity }}
          INPUT_AI_TRIAGE: ${{ inputs.ai_triage }}

      - name: Full scan
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p sarif
          MIN_SEV="${INPUT_MIN_SEVERITY}"
          AI_FLAGS=""
          if [ -n "${TOGETHER_API_KEY}" ]; then
            AI_FLAGS="--sast"
            if [ "${INPUT_AI_TRIAGE}" = "true" ]; then
              AI_FLAGS="${AI_FLAGS} --ai-triage --explain"
            fi
          fi
          # shellcheck disable=SC2086
          broly scan . --secrets --sca ${AI_FLAGS} --min-severity "${MIN_SEV}" \
            -f sarif -o sarif/results.sarif -q || true
          # shellcheck disable=SC2086
          broly scan . --secrets --sca ${AI_FLAGS} --min-severity "${MIN_SEV}" \
            -f json -o results.json -q || true
        env:
          TOGETHER_API_KEY: ${{ secrets.together_api_key }}
          INPUT_MIN_SEVERITY: ${{ inputs.min_severity }}
          INPUT_AI_TRIAGE: ${{ inputs.ai_triage }}

      - name: Upload SARIF
        if: always() && hashFiles('sarif/*.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif/
        continue-on-error: true

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request' && steps.diff.outputs.has_code == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let findings = [];
            for (const f of ['results.json', 'sast-results.json']) {
              if (!fs.existsSync(f)) continue;
              try {
                const data = JSON.parse(fs.readFileSync(f, 'utf8'));
                if (Array.isArray(data.findings)) findings = findings.concat(data.findings);
              } catch (_) {}
            }
            const sevOrder = { CRITICAL: 0, HIGH: 1, MEDIUM: 2, LOW: 3, INFO: 4 };
            findings.sort((a, b) => (sevOrder[a.severity] ?? 9) - (sevOrder[b.severity] ?? 9));
            const sevIcon = { CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🔵', INFO: '⚪' };
            const verdictIcon = { TRUE_POSITIVE: '🔺', FALSE_POSITIVE: '🟢' };
            let body;
            if (findings.length === 0) {
              body = '<!-- broly-scan -->\n## Broly Security Scan\n\n✅ No findings detected.\n\n> [Broly](https://github.com/Shasheen8/Broly)';
            } else {
              const counts = {};
              for (const f of findings) counts[f.severity] = (counts[f.severity] || 0) + 1;
              const summary = ['CRITICAL','HIGH','MEDIUM','LOW']
                .filter(s => counts[s])
                .map(s => `${sevIcon[s]} **${counts[s]} ${s}**`).join('  ');
              const hasTriage = findings.some(f => f.verdict);
              const header  = hasTriage
                ? '| Sev | Scanner | Issue | Location | Verdict |'
                : '| Sev | Scanner | Issue | Location |';
              const divider = hasTriage
                ? '|-----|---------|-------|----------|---------|'
                : '|-----|---------|-------|----------|';
              const rows = findings.slice(0, 30).map(f => {
                const sev   = `${sevIcon[f.severity]||''} ${f.severity}`;
                const issue = (f.rule_name||f.title||'-').substring(0, 55);
                const loc   = f.file_path
                  ? `\`${f.file_path}${f.start_line ? ':'+f.start_line : ''}\``
                  : '-';
                if (!hasTriage) return `| ${sev} | ${(f.type||'').toUpperCase()} | ${issue} | ${loc} |`;
                const verdict = f.verdict
                  ? `${verdictIcon[f.verdict]||'❔'}&nbsp;${f.verdict}`
                  : '-';
                return `| ${sev} | ${(f.type||'').toUpperCase()} | ${issue} | ${loc} | ${verdict} |`;
              }).join('\n');
              const note = findings.length > 30
                ? `\n> Showing top 30 of ${findings.length} findings.`
                : '';
              body = [
                '<!-- broly-scan -->',
                '## Broly Security Scan',
                '',
                summary,
                '',
                header,
                divider,
                rows,
                note,
                '',
                '> [Broly](https://github.com/Shasheen8/Broly) — Secrets · SCA · SAST · Powered by Together AI',
              ].join('\n');
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('<!-- broly-scan -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
