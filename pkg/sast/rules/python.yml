rules:
  - id: broly.sast.python.eval
    name: Use of eval()
    language: python
    severity: high
    cwe: [CWE-95]
    message: eval() runs arbitrary Python code. Never pass user-controlled input to eval().
    description: Arbitrary code execution risk via Python built-in eval().
    find_capture: call
    query: |
      (call
        function: (identifier) @func
        arguments: (argument_list)) @call
    filter:
      - capture: func
        regex: "^eval$"
    fix: Replace with ast.literal_eval() for safe expression parsing.
    references:
      - https://cwe.mitre.org/data/definitions/95.html

  - id: broly.sast.python.code_exec
    name: Use of exec()
    language: python
    severity: high
    cwe: [CWE-95]
    message: Python exec() runs arbitrary code. Never pass user-controlled input to exec().
    description: Arbitrary code execution risk via Python built-in exec().
    find_capture: call
    query: |
      (call
        function: (identifier) @func
        arguments: (argument_list)) @call
    filter:
      - capture: func
        regex: "^exec$"
    fix: Avoid exec() entirely. Refactor to use explicit function calls.
    references:
      - https://cwe.mitre.org/data/definitions/95.html

  - id: broly.sast.python.pickle_loads
    name: Insecure Deserialization via pickle
    language: python
    severity: high
    cwe: [CWE-502]
    message: pickle.loads() deserializes arbitrary Python objects and can run code. Never unpickle untrusted data.
    description: Pickle deserialization of untrusted data allows remote code execution.
    find_capture: call
    query: |
      (call
        function: (attribute
          object: (identifier) @obj
          attribute: (identifier) @method)
        arguments: (argument_list)) @call
    filter:
      - capture: obj
        regex: "^(pickle|cPickle|_pickle)$"
      - capture: method
        regex: "^(loads|load|Unpickler)$"
    fix: Use JSON or another safe serialization format for untrusted data.
    references:
      - https://owasp.org/www-community/vulnerabilities/Deserialization_of_untrusted_data
      - https://cwe.mitre.org/data/definitions/502.html

  - id: broly.sast.python.yaml_load
    name: Unsafe YAML Deserialization
    language: python
    severity: high
    cwe: [CWE-502]
    message: yaml.load() with untrusted input can run arbitrary code. Use yaml.safe_load() instead.
    description: yaml.load() without an explicit Loader can deserialize arbitrary Python objects.
    find_capture: call
    query: |
      (call
        function: (attribute
          object: (identifier) @obj
          attribute: (identifier) @method)
        arguments: (argument_list)) @call
    filter:
      - capture: obj
        regex: "^yaml$"
      - capture: method
        regex: "^load$"
    fix: Replace yaml.load(data) with yaml.safe_load(data).
    references:
      - https://cwe.mitre.org/data/definitions/502.html

  - id: broly.sast.python.subprocess_shell
    name: Subprocess with shell=True
    language: python
    severity: high
    cwe: [CWE-78]
    message: subprocess called with shell=True enables shell injection. Pass a list of arguments instead.
    description: shell=True passes the command to the OS shell, enabling injection via metacharacters.
    find_capture: call
    query: |
      (call
        arguments: (argument_list
          (keyword_argument
            name: (identifier) @kwarg
            value: (true)))) @call
    filter:
      - capture: kwarg
        regex: "^shell$"
    fix: Use subprocess.run(['cmd', 'arg1'], shell=False) with a list of arguments.
    references:
      - https://owasp.org/www-community/attacks/Command_Injection
      - https://cwe.mitre.org/data/definitions/78.html

  - id: broly.sast.python.os_system
    name: os.system() Command Execution
    language: python
    severity: medium
    cwe: [CWE-78]
    message: os.system() passes the command string to the OS shell and is vulnerable to injection.
    description: Direct shell command execution via os.system() or os.popen().
    find_capture: call
    query: |
      (call
        function: (attribute
          object: (identifier) @obj
          attribute: (identifier) @method)
        arguments: (argument_list)) @call
    filter:
      - capture: obj
        regex: "^os$"
      - capture: method
        regex: "^(system|popen)$"
    fix: Replace os.system() with subprocess.run(shlex.split(cmd), shell=False).
    references:
      - https://cwe.mitre.org/data/definitions/78.html

  - id: broly.sast.python.weak_hash
    name: Use of Weak Cryptographic Hash (MD5/SHA1)
    language: python
    severity: medium
    cwe: [CWE-327]
    message: MD5 and SHA1 are cryptographically broken. Use SHA-256 or stronger for security purposes.
    description: Weak hash function via hashlib.md5() or hashlib.sha1().
    find_capture: call
    query: |
      (call
        function: (attribute
          object: (identifier) @obj
          attribute: (identifier) @method)
        arguments: (argument_list)) @call
    filter:
      - capture: obj
        regex: "^hashlib$"
      - capture: method
        regex: "^(md5|sha1)$"
    fix: Use hashlib.sha256() or hashlib.sha3_256() instead.
    references:
      - https://cwe.mitre.org/data/definitions/327.html

  - id: broly.sast.python.sqli_execute
    name: SQL Injection via String Concatenation in execute()
    language: python
    severity: high
    cwe: [CWE-89]
    message: SQL query built via string concatenation in cursor.execute() may allow injection.
    description: User-controlled data concatenated into a SQL query via binary operator.
    find_capture: call
    query: |
      (call
        function: (attribute
          attribute: (identifier) @method)
        arguments: (argument_list
          (binary_operator) @concat)) @call
    filter:
      - capture: method
        regex: "^execute$"
    fix: Use parameterized queries with placeholders instead of string concatenation.
    references:
      - https://owasp.org/www-community/attacks/SQL_Injection
      - https://cwe.mitre.org/data/definitions/89.html
